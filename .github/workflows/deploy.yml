name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.19.3'
          cache: 'npm'
          
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: "30m"
          script: |
            # 确保目录存在
            mkdir -p /var/www/blog/scripts
            
            # 创建或更新部署脚本
            cat > /var/www/blog/scripts/deploy.sh << 'EOL'
            #!/bin/bash

            # 启用错误追踪和输出
            set -e
            set -x

            # 记录部署开始时间和目录
            echo "🚀 开始部署: $(date)"
            echo "当前目录: $(pwd)"

            # 进入项目目录
            cd /var/www/blog

            # 设置 Node 环境
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 20.19.3

            # 输出环境信息
            echo "Node 版本: $(node -v)"
            echo "NPM 版本: $(npm -v)"

            # 停止 PM2 进程
            if pm2 list | grep -q "blog"; then
                echo "停止应用..."
                pm2 stop blog
            fi

            # 清理旧的构建文件
            echo "清理旧的构建文件..."
            rm -rf .next
            rm -rf node_modules/.cache
            rm -rf node_modules

            # 拉取最新代码
            echo "拉取最新代码..."
            git fetch --all
            git reset --hard origin/main

            # 安装依赖
            echo "安装依赖..."
            npm install --legacy-peer-deps

            # 确保环境变量文件存在
            echo "检查环境变量..."
            if [ -f "/etc/secrets/blog.env" ]; then
                ln -sf /etc/secrets/blog.env .env.production
                echo "环境变量文件已链接"
                ls -la .env.production
            else
                echo "警告: 环境变量文件不存在"
                exit 1
            fi

            # 构建项目
            echo "开始构建..."
            NODE_ENV=production npm run build

            # 验证构建输出
            if [ ! -d ".next" ]; then
                echo "错误: 构建输出目录不存在"
                exit 1
            fi

            # 确保静态文件目录权限正确
            echo "设置静态文件权限..."
            sudo chown -R www-data:www-data .next
            sudo chmod -R 755 .next

            # 验证静态文件
            echo "验证静态文件..."
            if [ ! -d ".next/static" ]; then
                echo "错误: 静态文件目录不存在"
                ls -la .next/
                exit 1
            fi
            
            echo "静态文件列表:"
            ls -la .next/static/
            ls -la .next/static/chunks/
            ls -la .next/static/css/

            # 启动新的进程
            echo "启动新的 PM2 进程..."
            NODE_ENV=production pm2 start npm --name "blog" -- start

            # 保存 PM2 进程列表
            pm2 save

            # 验证进程是否正在运行
            if ! pm2 list | grep -q "blog.*online"; then
                echo "错误: PM2 进程未能正确启动"
                pm2 logs blog --lines 50
                exit 1
            fi

            # 等待应用启动
            echo "等待应用启动..."
            sleep 10

            # 检查应用是否响应
            if curl -f "http://localhost:3000" >/dev/null 2>&1; then
                echo "✅ 应用成功响应"
            else
                echo "错误: 应用未响应"
                pm2 logs blog --lines 50
                exit 1
            fi

            # 检查 nginx 配置
            echo "检查 nginx 配置..."
            sudo nginx -t && sudo systemctl reload nginx

            # 验证静态文件是否可访问
            echo "验证静态文件访问..."
            for file in $(find .next/static -type f); do
                relative_path=${file#.next/}
                url="http://localhost:3000/_next/$relative_path"
                echo "检查文件: $url"
                if ! curl -sf "$url" > /dev/null; then
                    echo "警告: 无法访问 $url"
                fi
            done

            # 输出部署信息
            echo "✅ 部署完成!"
            echo "部署版本: $(git rev-parse --short HEAD)"
            echo "完成时间: $(date)"
            
            # 显示 PM2 状态和日志
            pm2 list
            pm2 logs blog --lines 20
            EOL

            # 添加执行权限
            chmod +x /var/www/blog/scripts/deploy.sh
            
            # 运行部署脚本
            /var/www/blog/scripts/deploy.sh